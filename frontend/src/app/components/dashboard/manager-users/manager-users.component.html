<div class="user-manager">
  <header class="user-manager__header">
    <div class="user-manager__title-group">
      <h1 class="user-manager__title">Gestión de Personal</h1>
      <p class="user-manager__subtitle">Administra los accesos y roles de los empleados de Clinisalud.</p>
    </div>

    <button mat-raised-button color="primary" class="user-manager__add-btn" (click)="openCreateDialog()">
      <mat-icon>person_add</mat-icon>
      REGISTRAR NUEVO
    </button>
  </header>

  <section class="user-manager__filters">
    <mat-form-field appearance="outline" class="user-manager__search">
      <mat-label>Buscador global</mat-label>
      <input
        matInput
        (keyup)="applyFilter($event)"
        placeholder="Nombre, correo o DNI..."
        #input
      />
      <mat-icon matSuffix>search</mat-icon>
    </mat-form-field>
  </section>

  <div class="user-manager__table-container mat-elevation-z2">
    <div class="user-manager__loader" *ngIf="isLoading">
      <mat-spinner diameter="40"></mat-spinner>
    </div>

    <table mat-table [dataSource]="dataSource" matSort class="user-manager__table">
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Empleado</th>
        <td mat-cell *matCellDef="let user">
          <div class="user-manager__user-cell">
            <span class="user-manager__user-name">{{ user.firstName }} {{ user.lastName }}</span>
          </div>
        </td>
      </ng-container>

      <ng-container matColumnDef="dni">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>DNI</th>
        <td mat-cell *matCellDef="let user">{{ user.dni }}</td>
      </ng-container>

      <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Correo</th>
        <td mat-cell *matCellDef="let user">{{ user.email }}</td>
      </ng-container>

      <ng-container matColumnDef="role">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Rol</th>
        <td mat-cell *matCellDef="let user">
          <span class="user-manager__badge">{{ user.roleData?.name }}</span>
        </td>
      </ng-container>

      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Estado</th>
        <td mat-cell *matCellDef="let user">
          <div class="user-manager__status"
               [class.user-manager__status--active]="user.isActive"
               [class.user-manager__status--inactive]="!user.isActive">
            {{ user.isActive ? "ACTIVO" : "INACTIVO" }}
          </div>
        </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Acciones</th>
        <td mat-cell *matCellDef="let user">
          <button mat-icon-button [matMenuTriggerFor]="userMenu"
          [disabled]="user.roleData?.code === 'ADMIN'"
          [matTooltip]="user.roleData?.code === 'ADMIN' ? 'El administrador no puede ser editado' : ''">
            <mat-icon>more_horiz</mat-icon>
          </button>
          <mat-menu #userMenu="matMenu" class="user-manager__menu">
            <button mat-menu-item (click)="openPermissionsDialog(user)">
              <mat-icon color="primary">admin_panel_settings</mat-icon>
              <span>Gestionar Accesos</span>
            </button>
            <button mat-menu-item (click)="toggleUserStatus(user)">
              <mat-icon [color]="user.isActive ? 'warn' : 'accent'">
                {{ user.isActive ? "person_off" : "person_check" }}
              </mat-icon>
              <span>{{ user.isActive ? "Desactivar" : "Activar" }}</span>
            </button>
          </mat-menu>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>

      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell" colspan="6">
          <div class="user-manager__empty-state">
            <app-empty-state
              *ngIf="input.value.length > 0"
              [titulo]="'Búsqueda sin coincidencias'"
              [mensaje]="'No encontramos resultados para \'' + input.value + '\''"
              [icono]="'person_search'">
            </app-empty-state>

            <app-empty-state
              *ngIf="input.value.length === 0 && !isLoading"
              [titulo]="'No hay personal registrado'"
              [mensaje]="'Comienza registrando un nuevo empleado en el sistema.'"
              [icono]="'group_add'">
            </app-empty-state>
          </div>
        </td>
      </tr>
    </table>

    <mat-paginator
      class="user-manager__paginator"
      [pageSizeOptions]="[10, 25, 100]"
      aria-label="Seleccionar página">
    </mat-paginator>
  </div>
</div>
